name: Release binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.0.0"
        required: true
        default: "v1.0.0"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x86_64
            runner: ubuntu-latest
          - target: linux-arm64
            runner: ubuntu-24.04-arm
          - target: macos-arm64
            runner: macos-14

    env:
      NCRYPTED_TARGET: ${{ matrix.target }}
      HAS_MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE_P12 != '' && secrets.MACOS_CERTIFICATE_PASSWORD != '' }}
      HAS_APPLE_NOTARY: ${{ secrets.APPLE_ID != '' && secrets.APPLE_TEAM_ID != '' && secrets.APPLE_APP_SPECIFIC_PASSWORD != '' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Import Developer ID certificate
        if: runner.os == 'macOS' && env.HAS_MACOS_CERTIFICATE == 'true'
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          set -eu
          cert_path="$RUNNER_TEMP/developer_id.p12"
          keychain_path="$RUNNER_TEMP/ncrypted-signing.keychain-db"
          keychain_password="$(uuidgen)"

          CERT_PATH="$cert_path" python - <<'PY'
          import base64
          import os
          from pathlib import Path

          Path(os.environ["CERT_PATH"]).write_bytes(
              base64.b64decode(os.environ["MACOS_CERTIFICATE_P12"])
          )
          PY
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$cert_path" -P "$MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$keychain_path"
          security list-keychains -d user -s "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$keychain_password" "$keychain_path"

          identity="$(security find-identity -v -p codesigning "$keychain_path" | sed -n 's/.*"\(Developer ID Application:.*\)".*/\1/p' | head -n 1)"
          if [ -z "$identity" ]; then
            echo "Developer ID Application identity not found" >&2
            exit 1
          fi
          echo "NCRYPTED_CODESIGN_IDENTITY=$identity" >> "$GITHUB_ENV"

      - name: Build binary
        run: |
          chmod +x scripts/build-binary.sh scripts/package-binary.sh
          scripts/build-binary.sh

      - name: Package artifact
        run: scripts/package-binary.sh

      - name: Notarize macOS artifact
        if: runner.os == 'macOS' && env.HAS_MACOS_CERTIFICATE == 'true' && env.HAS_APPLE_NOTARY == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          set -eu
          artifact="$(ls dist/release/ncrypted-macos-*.zip | head -n 1)"
          xcrun notarytool submit "$artifact" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --wait

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/release/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Prepare release files
        run: |
          set -eu
          mkdir -p release
          find artifacts -type f \( -name 'ncrypted-*' ! -name '*.sha256' \) -exec cp {} release/ \;
          (cd release && sha256sum ncrypted-* > SHA256SUMS)
          ls -la release

      - name: Build release notes
        run: |
          set -eu
          version="${RELEASE_TAG#v}"
          # Extract this version's section from CHANGELOG.md: from its
          # "## [x.y.z]" heading up to (but not including) the next "## [".
          awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { capture = 1; print; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "No CHANGELOG.md section for $version; falling back to tag name"
            echo "$RELEASE_TAG" > release_notes.md
          fi
          echo "----- release notes -----"
          cat release_notes.md

      - name: Create or update release
        run: |
          set -eu
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --notes-file release_notes.md --draft=false --latest --repo "$GITHUB_REPOSITORY"
            gh release upload "$RELEASE_TAG" release/* --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$RELEASE_TAG" release/* --title "$RELEASE_TAG" --notes-file release_notes.md --latest --repo "$GITHUB_REPOSITORY"
          fi
